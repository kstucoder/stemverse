<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STEMVERSE — Kitob</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&family=Fira+Code:wght@400;600&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);font-family:'Nunito',sans-serif;overflow-x:hidden;min-height:100vh}
  /* SHELF */
  .shelf{max-width:1100px;margin:0 auto;padding:20px 10px;min-height:100vh;display:flex;flex-direction:column}
  .shelf-top{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;margin-bottom:16px}
  .book-title{font-family:'Fredoka One',cursive;font-size:22px;background:linear-gradient(135deg,#00f5ff,#6366f1,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .book-controls{display:flex;gap:8px;align-items:center}
  .ctrl-btn{background:#334155;border:none;color:#94a3b8;padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;transition:0.2s;font-family:'Nunito',sans-serif}
  .ctrl-btn:hover{background:#475569;color:#fff}
  .ctrl-btn.active{background:#6366f1;color:#fff}
  /* BOOK */
  .book{display:flex;gap:0;position:relative;flex:1;perspective:2000px;align-items:flex-start;justify-content:center}
  .page-wrap{width:50%;max-width:520px;min-width:320px;padding:0 6px;transition:all 0.5s cubic-bezier(0.4,0,0.2,1)}
  .page{background:linear-gradient(145deg,#fefcf5,#f8f5e8);border-radius:4px 12px 12px 4px;padding:28px 32px;min-height:600px;max-height:85vh;overflow-y:auto;position:relative;box-shadow:0 4px 20px rgba(0,0,0,0.3),inset 0 0 30px rgba(139,109,56,0.06);border:1px solid rgba(139,109,56,0.15);color:#2d2a1e;transition:all 0.4s}
  .page.left{border-radius:12px 4px 4px 12px;transform-origin:right center}
  .page.right{transform-origin:left center}
  .page::-webkit-scrollbar{width:4px}
  .page::-webkit-scrollbar-track{background:transparent}
  .page::-webkit-scrollbar-thumb{background:rgba(139,109,56,0.2);border-radius:2px}
  .page h1{font-family:'Fredoka One',cursive;font-size:26px;color:#4338ca;margin-bottom:10px;margin-top:4px}
  .page h2{font-family:'Fredoka One',cursive;font-size:20px;color:#1e293b;margin:16px 0 8px;border-bottom:2px solid #e8e4d8;padding-bottom:4px}
  .page h3{font-size:16px;color:#4338ca;margin:12px 0 6px;font-weight:700}
  .page p{font-size:14px;line-height:1.7;margin-bottom:8px;color:#3d3828}
  .page .meta{font-size:12px;color:#94a3b8;margin-bottom:12px}
  .page .story{background:#eef2ff;border-left:3px solid #6366f1;padding:10px 14px;border-radius:0 8px 8px 0;margin:10px 0;font-size:13px;line-height:1.6}
  .page .code{background:#0f172a;border:1px solid #1e293b;border-radius:8px;padding:12px 14px;margin:10px 0;font-family:'Fira Code',monospace;font-size:12px;line-height:1.5;overflow-x:auto;color:#00f5ff;position:relative}
  .page .code .copy{position:absolute;top:6px;right:6px;background:#334155;border:none;color:#94a3b8;padding:2px 8px;border-radius:4px;font-size:10px;cursor:pointer}
  .page .code .copy:hover{background:#475569;color:#fff}
  .page .bullet{padding:2px 0;font-size:13px;line-height:1.5}
  .page .bullet::before{content:'▸ ';color:#6366f1;font-weight:700}
  .page .win{background:rgba(0,255,136,0.06);border:1px solid rgba(0,255,136,0.2);border-radius:8px;padding:10px 14px;margin:10px 0;font-size:13px}
  .page .win b{color:#059669}
  .page .challenge{background:rgba(255,221,0,0.06);border:1px solid rgba(255,221,0,0.15);border-radius:8px;padding:10px 14px;margin:10px 0;font-size:13px}
  .page .challenge b{color:#b45309}
  .page .vocab{display:flex;flex-wrap:wrap;gap:4px;margin:8px 0}
  .page .vocab span{background:#f1f5f9;padding:2px 8px;border-radius:4px;font-size:11px;color:#64748b}
  .page .vocab span b{color:#4338ca}
  /* SPINE */
  .spine{width:24px;min-height:600px;background:linear-gradient(180deg,#312e81,#4338ca,#3730a3);border-radius:4px;position:relative;flex-shrink:0;box-shadow:0 4px 15px rgba(0,0,0,0.4);margin:0 -2px;z-index:2}
  .spine::after{content:'STEM⭐VERSE';position:absolute;bottom:30px;left:50%;transform:translateX(-50%) rotate(-90deg);font-family:'Fredoka One',cursive;font-size:12px;color:rgba(255,255,255,0.5);white-space:nowrap;letter-spacing:3px}
  /* COVER PAGE */
  .page.cover-page{background:linear-gradient(135deg,#1e1b4b,#312e81,#4338ca);color:#fff;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;border-color:#4338ca}
  .page.cover-page h1{font-size:36px;background:linear-gradient(135deg,#00f5ff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
  .page.cover-page .sub{color:#c7d2fe;font-size:16px;max-width:300px;line-height:1.5}
  .page.cover-page .info{color:#a5b4fc;font-size:12px;margin-top:20px}
  /* TOC */
  .toc-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;cursor:pointer;font-size:13px;transition:0.15s;color:#475569;text-decoration:none}
  .toc-item:hover{background:#eef2ff;color:#4338ca}
  .toc-item .num{font-weight:800;color:#6366f1;width:24px;font-size:12px}
  .toc-item .tit{flex:1}
  .toc-item .lv{font-size:9px;padding:1px 6px;border-radius:8px;background:rgba(99,102,241,0.1);color:#6366f1}
  /* PAGE NAV */
  .page-nav{display:flex;justify-content:center;gap:10px;padding:12px 0;position:sticky;bottom:0;background:linear-gradient(transparent,#0f172a);padding-top:20px}
  .nav-btn{padding:8px 20px;background:#334155;border:none;border-radius:8px;color:#fff;font-family:'Nunito',sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:0.2s;min-width:80px}
  .nav-btn:hover{background:#475569}
  .nav-btn:disabled{opacity:0.3;cursor:default}
  .nav-btn.next{background:linear-gradient(135deg,#6366f1,#8b5cf6)}
  .nav-btn.next:hover{opacity:0.9}
  .page-num{color:#64748b;font-size:11px;display:flex;align-items:center;padding:0 8px}
  /* RESPONSIVE */
  @media(max-width:768px){.book{flex-direction:column;align-items:center}.page-wrap{width:100%;max-width:100%}.spine{display:none}.page{min-height:400px;max-height:none;padding:20px}.page.left,.page.right{border-radius:4px}}
  @media print{body{background:#fff}.shelf{padding:0}.page-wrap{width:100%}.page{box-shadow:none;border:none;min-height:auto;max-height:none}.page.left{transform:none!important}.spine{display:none}.shelf-top{display:none}.page-nav{display:none}.book{display:block}.page-wrap{display:block;width:100%}}
</style>
</head>
<body>
<div class="shelf">
  <div class="shelf-top">
    <div class="book-title">STEM⭐VERSE &nbsp;·&nbsp; Darslik</div>
    <div class="book-controls">
      <button class="ctrl-btn" onclick="toggleFont()">🔤 Font</button>
      <button class="ctrl-btn" onclick="window.print()">🖨️ Chop et</button>
      <button class="ctrl-btn" onclick="toggleFullscreen()">⛶ Ekran</button>
    </div>
  </div>

  <div class="book" id="book">
    <!-- LEFT PAGE -->
    <div class="page-wrap" id="leftWrap">
      <div class="page left" id="leftPage"></div>
    </div>
    <!-- SPINE -->
    <div class="spine"></div>
    <!-- RIGHT PAGE -->
    <div class="page-wrap" id="rightWrap">
      <div class="page right" id="rightPage"></div>
    </div>
  </div>

  <div class="page-nav">
    <button class="nav-btn" id="prevBtn" onclick="prevPage()">◀ Oldingi</button>
    <span class="page-num" id="pageNum">1 / 1</span>
    <button class="nav-btn next" id="nextBtn" onclick="nextPage()">Keyingi ▶</button>
  </div>
</div>

<script>
// ===== LESSON DATA =====
const PAGES = [];

// Cover
PAGES.push({ type:'cover', title:'STEM⭐VERSE', subtitle:'Digital Twin Learning Platform', text:'20 ta interaktiv dars orqali Arduino, sensorlar va IoT texnologiyalarini o\'rganing.', info:'9-14 yosh uchun · 4 bosqich · 20 dars\nTo\'plam: Arduino Uno + ESP8266 + ESP32' });

// TOC
PAGES.push({ type:'toc', title:'Mundarija', items:[
  {n:'', t:'Kirish'},{n:'1', t:'Blink the LED — Energy City', l:'L1'},{n:'2', t:'Traffic Light Controller', l:'L1'},{n:'3', t:'Color Magic with RGB LED', l:'L1'},{n:'4', t:'Light Show Patterns', l:'L1'},{n:'5', t:'Secret Code Door', l:'L1'},
  {n:'6', t:'Speed Runner', l:'L2'},{n:'7', t:'Light Theremin', l:'L2'},{n:'8', t:'Temperature Garden', l:'L2'},{n:'9', t:'Distance Radar', l:'L2'},{n:'10', t:'Reaction Champion', l:'L2'},
  {n:'11', t:'Robot Arm Control', l:'L3'},{n:'12', t:'Piano Player', l:'L3'},{n:'13', t:'Smart Greenhouse', l:'L3'},{n:'14', t:'Parking Assistant', l:'L3'},{n:'15', t:'Meteor Shower Defense', l:'L3'},
  {n:'16', t:'Security System', l:'L4'},{n:'17', t:'Music Visualizer', l:'L4'},{n:'18', t:'IoT Dashboard (ESP8266)', l:'L4'},{n:'19', t:'Remote Sensor (ESP32)', l:'L4'},{n:'20', t:'Smart Home (ESP32)', l:'L4'},
]});

// Intro
PAGES.push({ type:'intro', title:'Kirish', content:[
  {h:'STEMVERSE nima?'}, {p:'STEMVERSE — bu 9-14 yoshdagi bolalar uchun Arduino asosidagi interaktiv ta\'lim platformasi. Bu oddiy Arduino kursi emas — bu real elektron sxemalar va virtual o\'yinlarni birlashtiruvchi "Digital Twin Learning Platform".'},
  {p:'An\'anaviy ta\'limda: sxema yig\'ish → kod yozish → tugatish. STEMVERSE da: sxema yig\'ish → kod yozish → Arduino ulash → o\'yinda natijani ko\'rish → g\'alaba → keyingi bosqich.'},
  {h:'Arduino asoslari'}, {p:'Arduino — bu ochiq kodli elektron platforma. U mikrokontroller, kirish/chiqish pinlari va dasturlash muhitidan (IDE) iborat.'},
  {b:'pinMode(pin, mode) — pin rejimini sozlash (OUTPUT yoki INPUT)'},{b:'digitalWrite(pin, value) — raqamli signal yozish (HIGH=5V yoki LOW=0V)'},{b:'digitalRead(pin) — raqamli signal o\'qish (0 yoki 1)'},{b:'analogRead(pin) — analog signal o\'qish (0-1023)'},{b:'analogWrite(pin, value) — PWM signal yozish (0-255)'},{b:'Serial.begin(9600) — serial aloqani boshlash'},{b:'delay(ms) — berilgan vaqtga kutish (millisekundlarda)'},
  {h:'Digital Twin konsepti'}, {p:'Digital Twin — bu real qurilmaning virtual nusxasi. Siz yig\'gan sxema va yozgan kodning virtual versiyasi o\'yinda aks etadi: real LED yonsa — o\'yinda chiroq yonadi, real tugma bosilsa — o\'yinda qahramon harakatlanadi.'},
]});

function lessonPage(n, title, xp, story, theory, pinout, code, gameConn, win, challenge, vocab) {
  return { type:'lesson', n, title, xp, story, theory, pinout, code, gameConn, win, challenge, vocab };
}

// LESSON 1
PAGES.push(lessonPage(1,'Blink the LED — Energy City','50 XP · Level 1 · 15-20 min',
  'Energy City zulmatga botgan. Electra — yagona energetik muhandis. Shaharni qayta yoritish uchun LEDni yondirish kerak. Har bir blink — shaharda yana bir chiroq yonadi.',
  ['LED (Light Emitting Diode) — yorug\'lik chiqaruvchi diod. Uning ikkita oyog\'i bor: anod (+) va katod (-). Anodni 5V ga, katodni GND ga ulash kerak.','220Ω rezistor LEDni haddan tashqari tokdan himoya qiladi. Rezistorsiz LED qizib ketib ishdan chiqishi mumkin.','digitalWrite(pin, HIGH) buyrug\'i pinga 5V beradi — LED yonadi. digitalWrite(pin, LOW) — 0V beradi, LED o\'chadi.','Delay(1000) — 1 soniya kutish. Bu vaqt davomida Arduino boshqa hech narsa qilmaydi.'],
  'LED anod (+ uzun oyoq) → 220Ω → Arduino Pin 13\nLED katod (- qisqa oyoq) → Arduino GND\nTugma → Pin 2, ikkinchi uchi → GND\nPotensiometr: o\'rta → A0, chetki → 5V va GND',
  'void setup() {\n  pinMode(13, OUTPUT);\n  pinMode(2, INPUT);\n  Serial.begin(9600);\n}\n\nvoid loop() {\n  digitalWrite(13, HIGH);  // LED yondi\n  delay(1000);              // 1 soniya kut\n  digitalWrite(13, LOW);   // LED o\'chdi\n  delay(1000);              // 1 soniya kut\n  Serial.print("POT:");\n  Serial.println(analogRead(A0));\n}',
  ['🔴 LED yonganda → Shahar chiroqlari yonadi, binolar yorishadi','🌑 LED o\'chganda → Chiroqlar o\'chadi, shahar qorong\'ilashadi','🎛️ Potensiometr burilganda → Energiya darajasi (%) o\'zgaradi','🚋 Tugma bosilganda → Tramvay harakatlanadi'],
  'LED 5 marta yonib-o\'chsin. Shahar to\'liq yorishadi! +50 XP 🏆',
  'Blink tezligini o\'zgartirib ko\'ring. delay(200) bilan shahar miltillaydi, delay(3000) bilan sekin yonadi.',
  ['pinMode — pin rejimini sozlash','digitalWrite — raqamli signal yozish','delay — kutish (ms)','HIGH/LOW — 5V / 0V','Serial — ketma-ket aloqa']
));

// LESSON 2
PAGES.push(lessonPage(2,'Traffic Light Controller','75 XP · Level 1 · 20-25 min',
  'Shahar markaziy chorrahasi tartibsizlikka botgan. Travis — yo\'l harakat muhandisi. 3 xil rangdagi svetafor orqali transport oqimini boshqarish kerak.',
  ['Svetofor — transportni tartibga soluvchi qurilma. 3 xil rang: qizil (to\'xta), sariq (diqqat), yashil (yur).','Har bir rang ma\'lum vaqt davomida yonadi: qizil 3s, sariq 1s, yashil 3s.','Tugma orqali piyoda rejimi — piyoda o\'tishni so\'rasa, svetafor tezroq qizilga o\'tadi.'],
  'Qizil LED → 220Ω → Pin 13\nSariq LED → 220Ω → Pin 12\nYashil LED → 220Ω → Pin 11\nTugma → Pin 2 (10kΩ pull-down)',
  'void setup() {\n  pinMode(13,OUTPUT); pinMode(12,OUTPUT);\n  pinMode(11,OUTPUT); pinMode(2,INPUT);\n  Serial.begin(9600);\n}\nvoid loop() {\n  if(digitalRead(2)==1) Serial.println("BTN:1");\n  digitalWrite(13,HIGH); delay(3000);\n  digitalWrite(13,LOW);\n  digitalWrite(12,HIGH); delay(1000);\n  digitalWrite(12,LOW);\n  digitalWrite(11,HIGH); delay(3000);\n  digitalWrite(11,LOW);\n}',
  ['🔴 Qizil → Mashinalar to\'xtaydi, piyodalar o\'tadi','🟠 Sariq → Ogohlantirish, o\'zgarishga tayyorlaning','🟢 Yashil → Mashinalar harakatlanadi','👤 Tugma bosilsa → Piyoda o\'tishni so\'raydi'],
  '10 marta to\'liq sikl (qizil→sariq→yashil). Chorraha tartibga keldi! +75 XP',
  '"Piyoda rejimi" — tugma bosilganda yashildan to\'g\'ridan-to\'g\'ri qizilga o\'tishni qo\'shing!',
  ['sikl — takrorlanuvchi jarayon','svetafor — trafik light','pull-down — rezistor orqali GND ga ulash']
));

// LESSON 3-20 compact
for(let i=3;i<=20;i++){
  const data = {
    3:{t:'Color Magic with RGB LED',xp:'100 XP · Level 1',s:'Dunyo ranglarini yo\'qotyapti. Mira — sehrgar shogirdi. RGB LED bilan ranglarni qaytarish kerak.',th:['RGB — qizil, yashil, ko\'k ranglar qo\'shilmasidan iborat model. PWM orqali 0-255 oralig\'ida boshqariladi.']},
    4:{t:'Light Show Patterns',xp:'100 XP · Level 1',s:'StarFest festivalida yorug\'lik yo\'q. Lumina DJ sifatida LED patternlar bilan sahnani yoritadi.',th:['Pattern — takrorlanuvchi ketma-ketlik. LEDlar 0/1 orqali boshqariladi.']},
    5:{t:'Secret Code Door',xp:'125 XP · Level 1',s:'Maxfiy hujjatlar temir eshik orqasida. Agent Kodi 5 bosqichli kodni yechishi kerak.',th:['State machine — bir necha holatli tizim. Har bir tugma bosilishi tizimni keyingi holatga o\'tkazadi.']},
    6:{t:'Speed Runner',xp:'150 XP · Level 2',s:'Yer osti laboratoriyasida qamalgan. Nova tunnel orqali qochishi kerak.',th:['Potensiometr — o\'zgaruvchan rezistor. AnalogRead 0-1023 oralig\'ida. Real-time boshqaruv.']},
    7:{t:'Light Theremin',xp:'150 XP · Level 2',s:'Kosmik kemada aloqa uzilgan. Sonar LDR va buzzer orqali signal topadi.',th:['LDR — yorug\'lik sensori. map() funksiyasi qiymatlarni konvertatsiya qiladi.']},
    8:{t:'Temperature Garden',xp:'175 XP · Level 2',s:'Yadro qishidan so\'ng yerdagi so\'nggi bog\'ni Flora saqlab qolishi kerak.',th:['LM35 — harorat sensori. Har 1°C uchun 10mV chiqaradi. AnalogRead orqali o\'qiladi.']},
    9:{t:'Distance Radar',xp:'175 XP · Level 2',s:'Harbiy baza atrofida noma\'lum ob\'ektlar. Radar HC-SR04 bilan ularni aniqlaydi.',th:['HC-SR04 ultrasonic sensor orqali masofa o\'lchanadi. pulseIn() funksiyasi ishlatiladi.']},
    10:{t:'Reaction Champion',xp:'200 XP · Level 2',s:'Maktab turniri. Quick reaksiya o\'lchagich yasaydi. 2 player!',th:['Reaksiya vaqtini millis() orqali o\'lchash. random() tasodifiy kutish uchun.']},
    11:{t:'Robot Arm Control',xp:'225 XP · Level 3',s:'Laboratoriyada radioaktiv material to\'kilgan. Mech robot qo\'l bilan uni yig\'adi.',th:['Servo motor 0-180°. Servo kutubxonasi (#include <Servo.h>). map() bilan burchakni sozlash.']},
    12:{t:'Piano Player',xp:'225 XP · Level 3',s:'Notalar Afsonasi musobaqasida pianino buzilgan. Melody 4 tugma bilan raqamli pianino yasaydi.',th:['INPUT_PULLUP rejimi. Nota chastotalari: C4=262Hz, D4=294Hz, E4=330Hz, F4=349Hz.']},
    13:{t:'Smart Greenhouse',xp:'250 XP · Level 3',s:'Koloniyada oziq-ovqat yetishmayapti. Agri sensorlar bilan issiqxonani boshqaradi.',th:['Tuproq namligi sensori. Bir necha sensorlarni bir vaqtda o\'qish. Kalibrlash.']},
    14:{t:'Parking Assistant',xp:'250 XP · Level 3',s:'Birinchi haydovchilik imtihoni. Parkerga parking assistent kerak.',th:['Ultrasonic sensor bilan masofa o\'lchash. 3 zona: xavfsiz, ogohlantirish, xavfli.']},
    15:{t:'Meteor Shower Defense',xp:'275 XP · Level 3',s:'Kosmik stansiyaga meteoritlar yaqinlashmoqda. Cosmo qalqonni boshqaradi.',th:['Multi-task boshqaruv: POT tezlik, BTN boost. Serial orqali ikki signal.']},
    16:{t:'Security System',xp:'300 XP · Level 4',s:'Muzeyda o\'g\'irlik bo\'ladi. Guardian PIR sensor bilan xavfsizlik tizimini o\'rnatadi.',th:['PIR — Passive Infrared sensor. Harakatni infraqizil nurlanish orqali aniqlaydi.']},
    17:{t:'Music Visualizer',xp:'300 XP · Level 4',s:'Klubda vizual effektlar yo\'q. Spectra musiqani ko\'rinadigan qiladi.',th:['Potensiometr bilan chastotani boshqarish. LED equalizer. tone() funksiyasi.']},
    18:{t:'IoT Dashboard (ESP8266)',xp:'400 XP · Level 4',s:'Zilzilada aloqa minoralari quladi. Link ESP8266 va Firebase orqali tarmoq tiklaydi.',th:['ESP8266 — WiFi plata. Firebase Real-time Database. IoT — Internet of Things.']},
    19:{t:'Remote Sensor (ESP32)',xp:'450 XP · Level 4',s:'Antarktida da global sensor stansiyasi. Polar ESP32 bilan ma\'lumot yig\'adi.',th:['ESP32 — ESP8266 ning kuchli versiyasi. Dual-core, Bluetooth+WiFi. Firebase sync.']},
    20:{t:'Smart Home (ESP32)',xp:'500 XP · Level 4',s:'FINAL BOSS! Home aqlli uy yaratadi. ESP32 + Firebase ikki tomonlama aloqa.',th:['Barcha bilimlarni birlashtirish. Bi-directional Firebase. Energiya optimallashtirish.']},
  }[i];
  PAGES.push(lessonPage(i, data.t, data.xp + ' · Level ' + (i<=5?1:i<=10?2:i<=15?3:4), data.s, data.th, '', '', [], 'Platformada to\'liq sxema va kod berilgan.', '', ''));
}

// ===== RENDER ENGINE =====
let curPage = 0;

function renderPage(idx, side) {
  const el = side === 'left' ? document.getElementById('leftPage') : document.getElementById('rightPage');
  const wrap = side === 'left' ? document.getElementById('leftWrap') : document.getElementById('rightWrap');
  if (!el || idx < 0 || idx >= PAGES.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = '';
  const p = PAGES[idx];
  let html = '';

  if (p.type === 'cover') {
    el.className = 'page left cover-page';
    html = `<div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;">
      <div style="font-size:48px;margin-bottom:10px">⭐</div>
      <h1 style="font-size:38px">${p.title}</h1>
      <div class="sub" style="color:#c7d2fe;font-size:15px;max-width:280px;text-align:center">${p.subtitle}</div>
      <div style="margin:20px 0;height:2px;width:100px;background:linear-gradient(90deg,transparent,#6366f1,transparent)"></div>
      <div style="color:#c7d2fe;font-size:13px;text-align:center">${p.text}</div>
      <div class="info" style="color:#a5b4fc;font-size:11px;margin-top:30px;white-space:pre-line">${p.info}</div>
    </div>`;
  } else if (p.type === 'toc') {
    el.className = 'page right';
    html = `<h1>${p.title}</h1><div style="margin-top:8px">`;
    p.items.forEach(item => {
      html += `<div class="toc-item" onclick="goToPage(${PAGES.indexOf(item) < 0 ? 0 : 0})">
        <span class="num">${item.n}</span><span class="tit">${item.t}</span>
        ${item.l ? `<span class="lv">${item.l}</span>` : ''}
      </div>`;
    });
    html += `</div>`;
  } else if (p.type === 'intro') {
    el.className = 'page left';
    html = `<h1>${p.title}</h1>`;
    p.content.forEach(c => {
      if (c.h) html += `<h2>${c.h}</h2>`;
      if (c.p) html += `<p>${c.p}</p>`;
      if (c.b) html += `<div class="bullet">${c.b}</div>`;
    });
  } else if (p.type === 'lesson') {
    el.className = 'page ' + (side === 'left' ? 'left' : 'right');
    html = `<h1>${p.n}. ${p.title}</h1>
    <div class="meta">${p.xp}</div>
    <div class="story">🎬 ${p.story}</div>`;
    if (p.theory.length > 0) {
      html += `<h2>📖 Nazariy qism</h2>`;
      p.theory.forEach(t => html += `<p>${t}</p>`);
    }
    if (p.pinout) {
      html += `<h2>🔌 Sxema</h2><div class="code">${p.pinout.replace(/\n/g,'<br>')}</div>`;
    }
    if (p.code) {
      html += `<h2>💻 Arduino kodi</h2><div class="code">${p.code.replace(/\n/g,'<br>')}<button class="copy" onclick="copyCode(this)">📋 Nusxa</button></div>`;
    }
    if (p.gameConn && p.gameConn.length > 0 && typeof p.gameConn[0] === 'string') {
      html += `<h2>🎮 Digital Twin</h2>`;
      p.gameConn.forEach(g => html += `<div class="bullet">${g}</div>`);
    }
    if (p.win) html += `<div class="win"><b>🏆 G'alaba:</b> ${p.win}</div>`;
    if (p.challenge) html += `<div class="challenge"><b>⭐ Challenge:</b> ${p.challenge}</div>`;
    if (p.vocab) {
      html += `<h3>📚 Yangi tushunchalar</h3><div class="vocab">`;
      p.vocab.forEach(v => html += `<span><b>${v.split('—')[0].trim()}</b> ${v.includes('—') ? '— '+v.split('—')[1].trim() : ''}</span>`);
      html += `</div>`;
    }
  }
  el.innerHTML = html;
}

function updateView() {
  const total = PAGES.length;
  let leftIdx = curPage;
  let rightIdx = curPage + 1;
  if (curPage % 2 === 1) { leftIdx = curPage - 1; rightIdx = curPage; }
  if (leftIdx >= 0 && leftIdx < total) renderPage(leftIdx, 'left'); else document.getElementById('leftWrap').style.display = 'none';
  if (rightIdx < total) renderPage(rightIdx, 'right'); else document.getElementById('rightWrap').style.display = 'none';
  document.getElementById('pageNum').textContent = `${Math.floor(curPage/2)+1} / ${Math.ceil(total/2)}`;
  document.getElementById('prevBtn').disabled = curPage <= 0;
  document.getElementById('nextBtn').disabled = curPage >= total - 1;
  // Scroll to top
  document.getElementById('leftPage').scrollTop = 0;
  document.getElementById('rightPage').scrollTop = 0;
}

function nextPage() { if (curPage < PAGES.length-1) { curPage++; updateView(); } }
function prevPage() { if (curPage > 0) { curPage--; updateView(); } }
function goToPage(idx) { curPage = Math.max(0, Math.min(idx, PAGES.length-1)); updateView(); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextPage(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevPage(); }
});

function copyCode(btn) {
  const code = btn.parentElement.textContent.replace('📋 Nusxa','').trim();
  navigator.clipboard.writeText(code); btn.textContent = '✅ Kopya';
  setTimeout(() => btn.textContent = '📋 Nusxa', 1500);
}

function toggleFont() {
  const pages = document.querySelectorAll('.page');
  pages.forEach(p => {
    const current = p.style.fontSize || '14px';
    p.style.fontSize = current === '14px' ? '16px' : current === '16px' ? '12px' : '14px';
  });
}

function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}

updateView();
</script>
</body>
</html>
