<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STEMVERSE — Premium Cutscene Demo</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#020617;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Segoe UI',sans-serif;overflow:hidden}
  .wrap{max-width:900px;width:100%;padding:20px;position:relative}
  canvas{width:100%;border-radius:18px;box-shadow:0 0 60px rgba(99,102,241,0.15),0 0 120px rgba(99,102,241,0.05);display:block;cursor:pointer}
  .info{text-align:center;margin-top:14px;display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
  .info span{padding:4px 14px;border-radius:20px;font-size:11px;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2);color:#a5b4fc}
  .info em{color:#64748b;font-size:12px}
</style>
</head>
<body>
<div class="wrap">
  <canvas id="c"></canvas>
  <div class="info">
    <span>🎬 Premium Cutscene</span>
    <span>⚡ Physics Lightning</span>
    <span>🌧️ Rain + Thunder</span>
    <span>🎥 Camera Shake</span>
    <span>🎞️ Letterbox</span>
  </div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  const rect = canvas.getBoundingClientRect();
  W = canvas.width = rect.width * (window.devicePixelRatio || 1);
  H = canvas.height = Math.max(300, W * 0.5) * (window.devicePixelRatio || 1);
  canvas.style.height = (H / (window.devicePixelRatio || 1)) + 'px';
}
resize();
window.addEventListener('resize', resize);

// ===== AUDIO SYSTEM =====
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playThunder() {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const filter = ctx.createBiquadFilter();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(80, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(25, ctx.currentTime + 2);
    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 2.5);
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(150, ctx.currentTime);
    filter.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 2);
    osc.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 2.5);
  } catch(e) {}
}

function playRainAmbient() {
  try {
    const ctx = getAudio();
    const bufSize = ctx.sampleRate * 4;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * 0.06;
    const src = ctx.createBufferSource();
    src.buffer = buf; src.loop = true;
    const filter = ctx.createBiquadFilter();
    filter.type = 'highpass'; filter.frequency.value = 3000;
    const gain = ctx.createGain(); gain.gain.value = 0.08;
    src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
    src.start();
    window._rainAmbient = src;
  } catch(e) {}
}

// ===== BUILDING GENERATOR =====
function generateCity() {
  const blds = [];
  const count = 14;
  for (let i = 0; i < count; i++) {
    const bw = 28 + Math.random() * 28;
    const bh = 50 + Math.sin(i * 1.7) * 45 + Math.random() * 50;
    const windows = [];
    const wCols = Math.floor(bw / 14);
    const wRows = Math.floor(bh / 14);
    for (let r = 0; r < wRows; r++) {
      for (let c = 0; c < wCols; c++) {
        windows.push({ x: 5 + c * 14, y: 8 + r * 14, lit: Math.random() > 0.25, flicker: Math.random() > 0.85 });
      }
    }
    blds.push({
      width: bw, height: bh,
      color: `hsl(${220 + Math.random() * 20}, ${10 + Math.random() * 15}%, ${25 + Math.random() * 15}%)`,
      roofColor: `hsl(220, 10%, ${20 + Math.random() * 10}%)`,
      windows, wCols, wRows,
      hasAntenna: Math.random() > 0.5,
      antennaH: 8 + Math.random() * 20,
      hasSign: Math.random() > 0.7,
      signColor: `hsl(${Math.random() * 360}, 80%, 55%)`,
    });
  }
  return blds;
}

// ===== LIGHTNING =====
function lightningBolt(x1, y1, x2, y2, intensity, displace, detail) {
  if (detail < 1) {
    ctx.strokeStyle = `rgba(255,255,255,${intensity})`;
    ctx.lineWidth = 1 + intensity * 3;
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    return;
  }
  const midX = (x1 + x2) / 2 + (Math.random() - 0.5) * displace;
  const midY = (y1 + y2) / 2 + (Math.random() - 0.5) * displace;
  lightningBolt(x1, y1, midX, midY, intensity, displace * 0.6, detail - 1);
  lightningBolt(midX, midY, x2, y2, intensity, displace * 0.6, detail - 1);
  // Branch
  if (detail === 3 && Math.random() > 0.5) {
    const bx = (x1 + midX) / 2 + (Math.random() - 0.5) * displace * 0.5;
    const by = (y1 + midY) / 2 + 20;
    const bendX = bx + (Math.random() - 0.5) * displace * 0.8;
    const bendY = by + displace * 0.8;
    ctx.strokeStyle = `rgba(200,200,255,${intensity * 0.35})`;
    ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bendX, bendY); ctx.stroke();
  }
}

// ===== RAIN =====
const rainDrops = [];
for (let i = 0; i < 150; i++) {
  rainDrops.push({
    x: Math.random() * 900, y: Math.random() * 500,
    speed: 300 + Math.random() * 400, len: 8 + Math.random() * 12,
    opacity: 0.15 + Math.random() * 0.25,
  });
}
function drawRain(dt) {
  ctx.strokeStyle = `rgba(148,163,184,0.25)`;
  ctx.lineWidth = 1;
  rainDrops.forEach(d => {
    d.x -= d.speed * dt * 0.3;
    d.y += d.speed * dt;
    if (d.y > H) { d.y = -d.len; d.x = Math.random() * W; }
    if (d.x < -10) { d.x = W + 10; }
    ctx.globalAlpha = d.opacity;
    ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d.x - 1, d.y + d.len); ctx.stroke();
  });
  ctx.globalAlpha = 1;
}

// ===== CLOUDS =====
const clouds = Array.from({ length: 3 }, (_, layer) => 
  Array.from({ length: 5 }, (_, i) => ({
    x: i * 200 + Math.random() * 100, y: 15 + layer * 25 + Math.random() * 10,
    w: 80 + Math.random() * 100 + layer * 40,
    h: 20 + Math.random() * 10 + layer * 8,
    speed: 15 + Math.random() * 10 - layer * 4,
    alpha: 0.08 + layer * 0.06,
  }))
);
function drawClouds(dt, t) {
  clouds.forEach((layer, li) => {
    layer.forEach(c => {
      c.x += c.speed * dt * 0.5;
      if (c.x > W + c.w) c.x = -c.w * 2;
      ctx.fillStyle = `rgba(148,163,184,${c.alpha})`;
      ctx.beginPath();
      ctx.ellipse(c.x, c.y, c.w * 0.5, c.h * 0.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(c.x + c.w * 0.3, c.y - c.h * 0.15, c.w * 0.35, c.h * 0.4, 0, 0, Math.PI * 2);
      ctx.fill();
    });
  });
}

// ===== MAIN ANIMATION =====
const city = generateCity();
let startTime = Date.now();
let shakeX = 0, shakeY = 0;
let shakeIntensity = 0;
let lightningFlash = 0;
let lightningTime = 0;

function animate() {
  const now = Date.now();
  const elapsed = (now - startTime) / 1000;
  const dt = Math.min(0.05, 0.016);

  // Timeline
  const phase = elapsed < 2 ? 'calm' : elapsed < 3.5 ? 'strike' : elapsed < 5 ? 'blackout' : 'resolve';

  // Camera shake
  if (phase === 'strike') {
    shakeIntensity = Math.max(0, shakeIntensity - dt * 3);
    if (elapsed > 2 && elapsed < 2.3) shakeIntensity = 1;
    shakeX = (Math.random() - 0.5) * shakeIntensity * 12;
    shakeY = (Math.random() - 0.5) * shakeIntensity * 8;
  } else {
    shakeIntensity = Math.max(0, shakeIntensity - dt * 2);
    shakeX = (Math.random() - 0.5) * shakeIntensity * 6;
    shakeY = (Math.random() - 0.5) * shakeIntensity * 4;
  }

  // Lightning flash
  if (phase === 'strike') {
    lightningFlash = Math.max(0, lightningFlash - dt * 3);
    if (elapsed > 2 && elapsed < 2.15) lightningFlash = 1;
  } else {
    lightningFlash = Math.max(0, lightningFlash - dt * 0.5);
  }

  ctx.save();
  ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
  ctx.translate(shakeX, shakeY);

  const w = W / (window.devicePixelRatio || 1);
  const h = H / (window.devicePixelRatio || 1);

  // ===== 1. SKY =====
  const sky = ctx.createLinearGradient(0, 0, 0, h);
  const flashVal = lightningFlash > 0.01 ? 0.3 : 0;
  if (phase === 'calm') {
    sky.addColorStop(0, '#1a1a3a'); sky.addColorStop(0.6, '#0f0f2a'); sky.addColorStop(1, '#0a0a1a');
  } else if (phase === 'strike') {
    sky.addColorStop(0, `rgba(${60 + flashVal * 195},${60 + flashVal * 195},${100 + flashVal * 155},1)`);
    sky.addColorStop(0.5, `rgba(${30 + flashVal * 150},${30 + flashVal * 100},${60 + flashVal * 100},1)`);
    sky.addColorStop(1, '#050510');
  } else {
    sky.addColorStop(0, '#050510'); sky.addColorStop(0.5, '#08081a'); sky.addColorStop(1, '#020208');
  }
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, w, h);

  // ===== 2. STARS =====
  if (phase !== 'strike' || lightningFlash < 0.3) {
    for (let i = 0; i < 50; i++) {
      const sx = (i * 137 + 50) % w;
      const sy = (i * 73 + 20) % (h * 0.4);
      const bright = 0.3 + 0.7 * Math.sin(elapsed * 0.5 + i * 1.7);
      ctx.fillStyle = `rgba(255,255,255,${bright * (0.3 + lightningFlash * 0.7)})`;
      ctx.beginPath(); ctx.arc(sx, sy, 0.5 + (i % 3) * 0.8, 0, Math.PI * 2); ctx.fill();
    }
  }

  // ===== 3. CLOUDS =====
  drawClouds(dt, elapsed);

  // ===== 4. BACKGROUND BUILDINGS (silhouettes) =====
  ctx.fillStyle = '#060612';
  for (let i = 0; i < 8; i++) {
    const bx = (i * 120 + 20) % w;
    const bh = 30 + Math.sin(i * 2.3) * 20;
    ctx.fillRect(bx, h * 0.6 - bh, 40 + Math.sin(i * 1.1) * 15, bh + h * 0.4);
  }

  // ===== 5. MAIN BUILDINGS =====
  const groundY = h * 0.72;
  const totalW = city.reduce((s, b) => s + b.width + 6, 0);
  const startX = (w - totalW) / 2;

  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;

  city.forEach((b, i) => {
    const bx = startX + city.slice(0, i).reduce((s, bb) => s + bb.width + 6, 0);
    const by = groundY - b.height;
    const isLit = phase !== 'blackout' && phase !== 'resolve';

    // Building shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(bx + 4, by + 4, b.width, b.height);

    // Building body
    const bg = ctx.createLinearGradient(bx, by, bx + b.width, by);
    const baseColor = b.color;
    bg.addColorStop(0, `hsl(220,8%,${isLit ? 30 : 15}%)`);
    bg.addColorStop(0.5, isLit ? '#2a2a3a' : '#15151a');
    bg.addColorStop(1, `hsl(220,5%,${isLit ? 22 : 12}%)`);
    ctx.fillStyle = bg;
    ctx.fillRect(bx, by, b.width, b.height);

    // Building edge highlight
    ctx.strokeStyle = `rgba(255,255,255,${isLit ? 0.04 : 0.01})`;
    ctx.lineWidth = 1;
    ctx.strokeRect(bx, by, b.width, b.height);

    // Windows
    b.windows.forEach((win, wi) => {
      const wx = bx + win.x;
      const wy = by + win.y;
      const winLit = isLit && win.lit;
      const flicker = win.flicker && phase === 'strike' && Math.random() > 0.7;

      if (winLit || flicker) {
        // Window glow
        const wg = ctx.createRadialGradient(wx + 4, wy + 3, 0, wx + 4, wy + 3, 10);
        wg.addColorStop(0, `rgba(255,221,0,${flicker ? 0.9 : 0.5})`);
        wg.addColorStop(1, 'transparent');
        ctx.fillStyle = wg;
        ctx.fillRect(wx - 4, wy - 4, 16, 14);

        // Window interior
        ctx.fillStyle = flicker ? '#fff' : `rgba(255,221,0,${0.6 + 0.4 * Math.sin(elapsed * 2 + i + wi)})`;
        ctx.fillRect(wx, wy, 8, 6);
      } else {
        // Dark window with slight reflection
        ctx.fillStyle = `hsl(220,5%,${8 + Math.sin(elapsed + wi) * 3}%)`;
        ctx.fillRect(wx, wy, 8, 6);
        ctx.fillStyle = 'rgba(255,255,255,0.03)';
        ctx.fillRect(wx, wy, 2, 6);
      }
    });

    // Roof
    ctx.fillStyle = isLit ? b.roofColor : '#0a0a0f';
    ctx.fillRect(bx - 2, by - 3, b.width + 4, 3);

    // Antenna
    if (b.hasAntenna) {
      ctx.strokeStyle = `rgba(100,100,120,${isLit ? 0.5 : 0.2})`;
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(bx + b.width / 2, by);
      ctx.lineTo(bx + b.width / 2, by - b.antennaH); ctx.stroke();
      ctx.fillStyle = '#ef4444';
      ctx.beginPath();
      ctx.arc(bx + b.width / 2, by - b.antennaH, 2, 0, Math.PI * 2);
      ctx.fill();
      // Blinking light
      ctx.fillStyle = `rgba(255,0,0,${0.3 + 0.7 * Math.sin(elapsed * 3 + i)})`;
      ctx.beginPath();
      ctx.arc(bx + b.width / 2, by - b.antennaH, 3, 0, Math.PI * 2);
      ctx.fill();
    }

    // Sign
    if (b.hasSign && isLit) {
      ctx.fillStyle = b.signColor;
      ctx.shadowColor = b.signColor;
      ctx.shadowBlur = 8;
      const signW = 14, signH = 6;
      ctx.fillRect(bx + b.width / 2 - signW / 2, by + 5, signW, signH);
      ctx.shadowBlur = 0;
    }
  });

  // ===== 6. GROUND =====
  const gg = ctx.createLinearGradient(0, groundY, 0, h);
  gg.addColorStop(0, '#0f172a'); gg.addColorStop(1, '#020617');
  ctx.fillStyle = gg;
  ctx.fillRect(0, groundY, w, h - groundY);

  // Road
  ctx.fillStyle = '#1a1a2a';
  ctx.fillRect(0, groundY + 5, w, 18);

  // Road markings
  ctx.setLineDash([12, 16]);
  ctx.strokeStyle = 'rgba(255,221,0,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, groundY + 14); ctx.lineTo(w, groundY + 14); ctx.stroke();
  ctx.setLineDash([]);

  // ===== 7. LIGHTNING =====
  if (phase === 'strike' && elapsed > 2 && elapsed < 2.4) {
    const intensity = Math.max(0, 1 - (elapsed - 2) / 0.4);
    const lx = w * 0.65;
    
    // Main bolt
    ctx.save();
    ctx.globalAlpha = intensity;
    ctx.strokeStyle = `rgba(255,255,255,${intensity})`;
    ctx.lineWidth = 2 + intensity * 4;
    ctx.shadowColor = `rgba(200,200,255,${intensity * 0.5})`;
    ctx.shadowBlur = 20;
    lightningBolt(lx, 0, lx + 30, groundY * 0.8, intensity, 80, 5);
    ctx.restore();

    // Lightning glow
    const lg = ctx.createRadialGradient(lx + 30, groundY * 0.7, 0, lx + 30, groundY * 0.7, 150);
    lg.addColorStop(0, `rgba(200,200,255,${intensity * 0.08})`);
    lg.addColorStop(1, 'transparent');
    ctx.fillStyle = lg;
    ctx.fillRect(0, 0, w, h);

    // Trigger thunder
    if (elapsed > 2.05 && elapsed < 2.1 && !window._thunderPlayed) {
      playThunder();
      window._thunderPlayed = true;
    }
  }

  // ===== 8. RAIN =====
  if (phase !== 'calm') drawRain(dt);

  // Start rain ambient at strike
  if (phase === 'strike' && !window._rainStarted) {
    playRainAmbient();
    window._rainStarted = true;
  }

  // ===== 9. FOG =====
  const fog = ctx.createRadialGradient(w/2, groundY + 30, 0, w/2, groundY + 30, h * 0.4);
  fog.addColorStop(0, 'rgba(148,163,184,0.05)');
  fog.addColorStop(0.5, 'rgba(148,163,184,0.03)');
  fog.addColorStop(1, 'transparent');
  ctx.fillStyle = fog;
  ctx.fillRect(0, 0, w, h);

  // ===== 10. POST-PROCESSING =====

  // Vignette
  const vig = ctx.createRadialGradient(w/2, h/2, h * 0.25, w/2, h/2, h * 0.7);
  vig.addColorStop(0, 'transparent');
  vig.addColorStop(0.7, 'rgba(0,0,0,0.05)');
  vig.addColorStop(1, `rgba(0,0,0,${phase === 'blackout' ? 0.5 : 0.3})`);
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, w, h);

  // ===== 11. TEXT OVERLAY =====
  ctx.textAlign = 'center';

  if (phase === 'calm') {
    if (elapsed > 0.8) {
      const alpha = Math.min(1, (elapsed - 0.8) * 2);
      ctx.fillStyle = `rgba(255,255,255,${alpha * 0.8})`;
      ctx.font = 'bold 17px sans-serif';
      ctx.fillText('🌇 Energy City — tinch kech...', w / 2, 40);
    }
  }

  if (phase === 'strike' && elapsed > 2.5) {
    const alpha = Math.min(1, (elapsed - 2.5) * 3);
    ctx.fillStyle = `rgba(255,100,100,${alpha * 0.9})`;
    ctx.font = 'bold 26px sans-serif';
    ctx.fillText('⚡ YASHIN! ⚡', w / 2, h * 0.3);
  }

  if (phase === 'blackout') {
    const alpha = Math.min(1, (elapsed - 3.5) * 2);
    ctx.fillStyle = `rgba(255,255,255,${alpha * 0.6})`;
    ctx.font = '15px sans-serif';
    ctx.fillText('Chiroqlar o\'chdi...', w / 2, 35);
  }

  if (phase === 'resolve') {
    const alpha = Math.min(1, (elapsed - 5) * 2);
    ctx.fillStyle = `rgba(255,221,0,${alpha})`;
    ctx.font = 'bold 22px sans-serif';
    ctx.fillText('"Electra, shaharni qutqar!"', w / 2, 40);
    
    // Pulsing ring
    const pulse = ((elapsed - 5) * 2) % 1;
    ctx.strokeStyle = `rgba(255,221,0,${0.2 * (1 - pulse)})`;
    ctx.lineWidth = 1.5;
    const r = 30 + pulse * 80;
    ctx.beginPath(); ctx.arc(w/2, h/2, r, 0, Math.PI * 2); ctx.stroke();
  }

  // ===== 12. LETTERBOX =====
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, w, h * 0.06);
  ctx.fillRect(0, h - h * 0.06, w, h * 0.06);

  ctx.restore();

  // Loop
  if (elapsed < 7) {
    requestAnimationFrame(animate);
  } else {
    // Final frame
    ctx.save();
    ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
    ctx.fillStyle = 'rgba(15,23,42,0.95)';
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = '#ffdd00';
    ctx.font = 'bold 24px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('✅ Premium Cutscene — Yakun', w/2, h/2 - 10);
    ctx.fillStyle = '#94a3b8';
    ctx.font = '14px sans-serif';
    ctx.fillText('(Aslida StoryMission + Game ochiladi)', w/2, h/2 + 25);
    ctx.restore();

    // Stop rain ambient
    if (window._rainAmbient) { try { window._rainAmbient.stop(); } catch(e) {} }
  }
}

animate();
</script>
</body>
</html>
